version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: project-pulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: project-pulse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit
    container_name: project-pulse-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
